# Deploy to VPS
# Triggers:
#   - Push to main → Test, build, and deploy
#   - Manual trigger → Test, build, and deploy
#
# Required Secrets (in vps environment):
#   VPS_HOST: VPS IP address or hostname
#   VPS_PORT: SSH port (e.g., 22)
#   VPS_USER: SSH username
#   VPS_SSH_KEY: Private SSH key for authentication
#   VPS_DEPLOY_PATH: Path to project on VPS (e.g., /opt/ai-platform)

name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Install API dependencies
        run: cd api && pnpm install --frozen-lockfile

      - name: Run unit tests
        run: pnpm ng test

      - name: Production build (frontend)
        run: pnpm ng build

      - name: Build API
        run: cd api && pnpm build

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test]
    environment: vps

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          port: ${{ secrets.VPS_PORT }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            git pull origin main
            docker compose up -d --build
            docker compose ps
            echo "Waiting for health check..."
            sleep 10
            docker compose ps
